// ─── 3D Mouse tracker ───
function useMouse() {
  const [pos, setPos] = useState({ x: 0.5, y: 0.5 });
  useEffect(() => {
    const h = (e) => setPos({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });
    window.addEventListener('mousemove', h);
    return () => window.removeEventListener('mousemove', h);
  }, []);
  return pos;
}

// ─── Intersection Observer hook ───
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

// ─── Animated grid background ───

            <path d="M 60 0 L 0 0 0 60" fill="none" stroke={c} strokeWidth="0.5" />

        </defs>

      </svg>
    </div>
  );
}

// ─── Floating 3D particles ───
function Particles({ count, mouse, hue1, hue2 }) {
  const particles = useRef([]);
  if (particles.current.length === 0) {
    for (let i = 0; i < 60; i++) {
      particles.current.push({
        x: Math.random() * 100, y: Math.random() * 100,
        size: 2 + Math.random() * 4, speed: 0.3 + Math.random() * 0.7,
        hue: Math.random() > 0.5 ? hue1 : hue2, opacity: 0.15 + Math.random() * 0.35,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 50);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none' }}>
      {particles.current.slice(0, count).map((p, i) => {
        const t = tick * 0.02;
        const mx = (mouse.x - 0.5) * 20 * (p.speed);
        const my = (mouse.y - 0.5) * 20 * (p.speed);
        const fx = p.x + Math.sin(t * p.speed + p.phase) * 3 + mx;
        const fy = p.y + Math.cos(t * p.speed + p.phase) * 2 + my;
        return (
          <div key={i} style={{
            position: 'absolute',
            left: `${fx}%`, top: `${fy}%`,
            width: p.size, height: p.size,
            borderRadius: '50%',
            background: `oklch(0.7 0.2 ${p.hue})`,
            opacity: p.opacity,
            filter: `blur(${p.size > 4 ? 1 : 0}px)`,
            transition: 'left 0.3s ease-out, top 0.3s ease-out',
          }} />
        );
      })}
    </div>
  );
}

// ─── 3D tilt card ───
function TiltCard({ children, style, className }) {
  const ref = useRef(null);
  const [transform, setTransform] = useState('perspective(800px) rotateX(0deg) rotateY(0deg)');
  const [glare, setGlare] = useState({ x: 50, y: 50, opacity: 0 });

  const handleMove = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const rotY = (x - 0.5) * 16;
    const rotX = (0.5 - y) * 16;
    setTransform(`perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`);
    setGlare({ x: x * 100, y: y * 100, opacity: 0.12 });
  };
  const handleLeave = () => {
    setTransform('perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)');
    setGlare({ x: 50, y: 50, opacity: 0 });
  };

  return (
    <div ref={ref} onMouseMove={handleMove} onMouseLeave={handleLeave}
      style={{ transform, transition: 'transform 0.2s ease-out', transformStyle: 'preserve-3d', ...style }} className={className}>
      {children}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 'inherit', pointerEvents: 'none',
        background: `radial-gradient(circle at ${glare.x}% ${glare.y}%, rgba(255,255,255,${glare.opacity}), transparent 60%)`,
        transition: 'opacity 0.2s',
      }} />
    </div>
  );
}

}

            <p style={{ fontSize: 15, color: 'var(--text2)', lineHeight: 1.7, marginBottom: 20, fontStyle: 'italic' }}>{o.text}</p>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{o.author}</div>
              <div style={{ fontSize: 13, color: 'var(--text2)' }}>{o.role}</div>
            </div>
          </TiltCard>
        ))}
      </div>
    </Section>
  );
}

// ─── CONTACT ───
function Contact({ t, accentHue, accentHue2 }) {
  const c1 = `oklch(0.65 0.2 ${accentHue})`;
  const c2 = `oklch(0.65 0.2 ${accentHue2})`;
  return (
    <Section id="contact">
      <SectionTitle accentHue={accentHue}>{t.contactTitle}</SectionTitle>
      <TiltCard style={{
        background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 20, padding: '48px 40px',
        position: 'relative', overflow: 'hidden', textAlign: 'center', maxWidth: 600,
      }}>
        <p style={{ fontSize: 18, color: 'var(--text2)', marginBottom: 32 }}>{t.contactDesc}</p>
        <a href="mailto:loksy0.a@gmail.com" style={{
          display: 'inline-block', padding: '14px 36px', borderRadius: 10, fontWeight: 600, fontSize: 15,
          background: `linear-gradient(135deg, ${c1}, ${c2})`,
          color: '#fff', transition: 'transform 0.2s, box-shadow 0.2s',
          boxShadow: `0 4px 24px ${c1}44`,
        }}
          onMouseEnter={e => { e.target.style.transform = 'translateY(-2px)'; }}
          onMouseLeave={e => { e.target.style.transform = 'translateY(0)'; }}
        >{t.contactCta}</a>

        <div style={{ display: 'flex', gap: 20, justifyContent: 'center', marginTop: 32 }}>
          {[
            { label: 'GitHub', href: 'https://github.com/Andrev0dev', icon: '◈' },
            { label: 'Discord: andrev0', href: '#', icon: '◉' },
            { label: 'loksy0.a@gmail.com', href: 'mailto:loksy0.a@gmail.com', icon: '◎' },
          ].map((l, i) => (
            <a key={i} href={l.href} target="_blank" rel="noopener" style={{
              fontSize: 13, color: 'var(--text2)', fontFamily: 'var(--mono)',
              display: 'flex', alignItems: 'center', gap: 6, transition: 'color 0.2s',
            }}
              onMouseEnter={e => e.currentTarget.style.color = c1}
              onMouseLeave={e => e.currentTarget.style.color = 'var(--text2)'}
            ><span style={{ color: c1 }}>{l.icon}</span> {l.label}</a>
          ))}
        </div>
      </TiltCard>
    </Section>
  );
}

// ─── FOOTER ───
function Footer({ t }) {
  return (
    <footer style={{
      textAlign: 'center', padding: '32px 24px', fontSize: 13,
      color: 'var(--text2)', borderTop: '1px solid var(--border)',
    }}>{t.footer}</footer>
  );
}

// ─── APP ───
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const mouse = useMouse();
  const lang = tweaks.language;
  const t = T[lang] || T.pl;
  const h1 = tweaks.accentHue;
  const h2 = tweaks.accentSecondaryHue;

  const setLang = (l) => setTweak('language', l);

  return (
    <>
      <GridBG visible={tweaks.gridVisible} accentHue={h1} />
      <Particles count={tweaks.particleCount} mouse={mouse} hue1={h1} hue2={h2} />
      <div style={{ position: 'relative', zIndex: 1 }}>
        <Nav t={t} lang={lang} setLang={setLang} accentHue={h1} />
        <Hero t={t} mouse={mouse} accentHue={h1} accentHue2={h2} />
        <About t={t} accentHue={h1} />
        <Services t={t} accentHue={h1} accentHue2={h2} />
        <Projects t={t} accentHue={h1} accentHue2={h2} />
        <Opinions t={t} accentHue={h1} />
        <Contact t={t} accentHue={h1} accentHue2={h2} />
        <Footer t={t} />
      </div>

      <TweaksPanel>
        <TweakSection title="Kolory">
          <TweakSlider label="Akcent główny (hue)" value={h1} min={0} max={360} step={5} onChange={v => setTweak('accentHue', v)} />
          <TweakSlider label="Akcent drugi (hue)" value={h2} min={0} max={360} step={5} onChange={v => setTweak('accentSecondaryHue', v)} />
        </TweakSection>
        <TweakSection title="Efekty 3D">
          <TweakToggle label="Siatka tła" value={tweaks.gridVisible} onChange={v => setTweak('gridVisible', v)} />
          <TweakSlider label="Ilość cząsteczek" value={tweaks.particleCount} min={0} max={60} step={5} onChange={v => setTweak('particleCount', v)} />
        </TweakSection>
        <TweakSection title="Język">
          <TweakRadio label="Język" value={lang} options={['pl', 'en']} onChange={v => setTweak('language', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
